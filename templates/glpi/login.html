{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Liberaí IFAL</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{% static 'img/logo.png' %}">

    <style>
        :root {
            --bg-dark: #000020;
            --neon-pink: #ff66c4;
            --input-bg: #8c8c9e;
            --text-light: #ffffff;
        }
        
        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .font-bebas {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 1px;
        }

        /* --- LADO ESQUERDO (FORMULÁRIO) --- */
        .login-form-col {
            display: flex;
            flex-direction: column;
            justify-content: center;
            
            /* APROXIMAÇÃO: Empurra o conteúdo para a direita (perto do centro da tela) */
            align-items: flex-end; 
            
            /* Cria um respiro para não grudar na imagem exatamento no meio */
            padding-right: 4vw; 
            
            text-align: center;
            z-index: 2;
            height: 100vh;
        }

        .form-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            width: 150px;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .login-title {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.3rem;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
            text-align: left; 
            display: block;
            width: 100%;
            padding-left: 5px;
        }

        /* INPUTS */
        .form-control-custom {
            background-color: var(--input-bg);
            border: none;
            border-radius: 20px;
            padding: 15px 20px;
            height: 55px;
            color: #000;
            font-weight: 600;
            font-size: 1.2rem;
            width: 100%;
        }
        
        .form-control-custom:focus {
            background-color: #a0a0b0; 
            box-shadow: 0 0 0 3px var(--neon-pink);
            outline: none;
            color: #000;
        }

        /* BOTÃO ENTRAR */
        .btn-login {
            background-color: var(--neon-pink);
            color: white;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            letter-spacing: 1px;
            border: none;
            border-radius: 15px;
            padding: 10px;
            width: 100%;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            background-color: #ff80d0;
            transform: scale(1.02);
            color: white;
        }

        /* --- LADO DIREITO (IMAGEM) --- */
        .login-image-col {
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            
            /* APROXIMAÇÃO: Empurra o conteúdo para a esquerda (perto do centro da tela) */
            justify-content: flex-start;
            
            /* Cria um respiro para não grudar no formulário */
            padding-left: 4vw;
            
            height: 100vh;
        }

        .main-illustration {
            max-height: 85vh; 
            width: auto;
            max-width: 90%;
            display: block;
        }

        @media (max-width: 991.98px) {
            .login-image-col { display: none; }
            body { overflow-y: auto; }
            
            /* No celular, volta a centralizar tudo no meio da tela */
            .login-form-col {
                align-items: center; 
                padding-right: 1.5rem;
                padding-left: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container-fluid h-100">
        <div class="row h-100 g-0">
            
            <div class="col-lg-6 login-form-col">
                
                <div class="form-wrapper">
                    
                    <div class="mb-3">
                        <img src="{% static 'img/logo.png' %}" alt="Liberai Logo" class="login-logo">
                        <h1 class="login-title font-bebas text-white">DESEJA ENTRAR?</h1>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        {% if form.errors %}
                            <div class="alert alert-danger py-2 mb-3" 
                                 style="background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink);">
                                Usuário ou senha incorretos.
                            </div>
                        {% endif %}
    
                        <div class="mb-3">
                            <label for="id_username" class="form-label">EMAIL:</label>
                            {{ form.username }} 
                        </div>
    
                        <div class="mb-4">
                            <label for="id_password" class="form-label">SENHA:</label>
                            {{ form.password }}
                        </div>
    
                        <button type="submit" class="btn btn-login">
                            ENTRAR
                        </button>
                    </form>
                </div>

            </div>
            
            <div class="col-lg-6 login-image-col d-none d-lg-flex">
                <img src="{% static 'img/elem_login.png' %}" alt="Ilustração Esporte" class="main-illustration">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
